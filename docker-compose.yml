version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - '3001:3001'
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3001
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  redis_data:
